name: Build and Deploy Blog
on:
  issues:
    types: [opened, edited, deleted, labeled, unlabeled, reopened, closed]
  issue_comment:
    types: [created, edited, deleted]
  schedule:
    - cron: '0 */6 * * *'  # every 6 hours
  workflow_dispatch:  # manual trigger

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python blog/generate.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          # YouTube — set YOUTUBE_API_KEY as a repository Secret and
          # YOUTUBE_PLAYLIST_IDS as a repository Variable (Settings → Secrets/Variables).
          # Leave unset to disable the "My Watching" section.
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_PLAYLIST_IDS: ${{ vars.YOUTUBE_PLAYLIST_IDS }}
          # Hacker News — set HN_USERNAME as a repository Variable (Settings → Variables).
          # Leave unset to disable the "My Reading" section.
          HN_USERNAME: ${{ vars.HN_USERNAME }}
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          cname: ''  # set this if you have a custom domain
