name: Build and Deploy Blog
on:
  push:
    branches: [main]  # rebuild whenever a PR merges (or any push to main)
  issues:
    types: [opened, edited, deleted, labeled, unlabeled, reopened, closed]
  issue_comment:
    types: [created, edited, deleted]
  schedule:
    - cron: '0 */6 * * *'  # every 6 hours
  workflow_dispatch:  # manual trigger

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: Show blog configuration
        env:
          YOUTUBE_PLAYLIST_IDS: ${{ vars.YOUTUBE_PLAYLIST_IDS }}
          HN_USERNAME: ${{ vars.HN_USERNAME }}
        run: |
          echo "=== Blog configuration ==="
          if [ -n "$YOUTUBE_PLAYLIST_IDS" ]; then
            echo "✅ YouTube (My Watching):     configured"
          else
            echo "⚠️  YouTube (My Watching):     not configured"
            echo "   → Run the 'Set Up Blog' workflow or add a YOUTUBE_PLAYLIST_IDS repository variable."
          fi
          if [ -n "$HN_USERNAME" ]; then
            echo "✅ Hacker News (My Reading):  configured"
          else
            echo "⚠️  Hacker News (My Reading):  not configured"
            echo "   → Run the 'Set Up Blog' workflow or add an HN_USERNAME repository variable."
          fi
          echo "=========================="
      - run: python blog/generate.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          # YouTube — no API key needed! Uses YouTube's free public Atom/RSS feeds.
          # Set YOUTUBE_PLAYLIST_IDS as a repository Variable (Settings → Variables)
          # with one or more comma-separated playlist IDs.
          # Leave unset to disable the "My Watching" section.
          YOUTUBE_PLAYLIST_IDS: ${{ vars.YOUTUBE_PLAYLIST_IDS }}
          # Hacker News — set HN_USERNAME as a repository Variable (Settings → Variables).
          # Leave unset to disable the "My Reading" section.
          HN_USERNAME: ${{ vars.HN_USERNAME }}
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          cname: ''  # set this if you have a custom domain
