<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}{{ repo_name }}{% endblock %}</title>
  {% block meta %}
  <meta name="description" content="{{ repo_name }} — a personal blog powered by SimpleGitBlog." />
  <meta property="og:title" content="{{ repo_name }}" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="{{ base_path }}" />
  {% endblock %}
  <link rel="icon" type="image/svg+xml" href="{{ base_path }}static/favicon.svg" />
  <link rel="stylesheet" href="{{ base_path }}static/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="{{ base_path }}" class="site-title">{{ repo_name }}</a>
      <nav class="site-nav">
        <a href="{{ base_path }}">Home</a>
        <a href="{{ base_path }}config/">Config</a>
        <a href="{{ repo_url }}" target="_blank" rel="noopener noreferrer">GitHub</a>
        {% if not has_social_links %}
        <a
          href="{{ base_path }}config/"
          class="setup-warning"
          title="No social accounts linked on your GitHub profile. Click for configuration details."
        >⚠️</a>
        {% endif %}
      </nav>
    </div>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>
        {% if pipeline_warnings %}
        <a href="{{ pipeline_url }}" target="_blank" rel="noopener noreferrer"
           title="{{ pipeline_warnings | length }} build warning(s) — click to view pipeline log">⚠️</a>
        {% endif %}
        Powered by <a href="{{ repo_url }}" target="_blank" rel="noopener noreferrer">SimpleGitBlog</a>
        &mdash; <a href="{{ pipeline_url }}" target="_blank" rel="noopener noreferrer">generated {{ generated_at }}</a> in {{ generated_in }}.
      </p>
    </div>
  </footer>
</body>
</html>
