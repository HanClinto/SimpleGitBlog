<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}{{ repo_name }}{% endblock %}</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="/" class="site-title">{{ repo_name }}</a>
      <nav class="site-nav">
        <a href="/">Home</a>
        <a href="{{ repo_url }}" target="_blank" rel="noopener noreferrer">GitHub</a>
      </nav>
    </div>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>
        Powered by <a href="{{ repo_url }}" target="_blank" rel="noopener noreferrer">SimpleGitBlog</a>
        &mdash; generated {{ generated_at }} in {{ generated_in }}.
      </p>
    </div>
  </footer>
</body>
</html>
